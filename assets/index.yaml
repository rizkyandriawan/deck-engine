      - "Demand financial compensation in exchange for labor"
      - "Frequently develop opinions about menu items"
      - "Cannot operate at temperatures above 800°F"
      - "Subject to OSHA regulations regarding 'limb retention'"
      - "Statistically prone to coughing into the soup"

