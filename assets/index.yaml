  # 65. definition
  - type: definition
    title: "Key Concept"
    term: "Pickle Alignment Index (PAI)"
    etymology: "Coined by Dr. Patty Rendang, 2023, after the 'Great Pickle Catastrophe' at QuickBite #2891"
    definition: "A normalized measure (0.0–1.0) of how symmetrically pickles are distributed across a burger patty. Industry benchmark is 0.95; GORDON-9000 averages 0.997."
    examples:
      - "PAI = 1.0: Perfect concentric pickle rings (only achieved in lab conditions)"
      - "PAI = 0.5: Two pickles touching, one floating off the edge — typical human chef performance"
      - "PAI = 0.0: All pickles in one corner, one in the customer's lap"

