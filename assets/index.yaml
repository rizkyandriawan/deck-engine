  # 7. text
  - type: text
    title: "Executive Summary"
    body: |
      QuickBite Global currently relies on 47,000 human chefs across 3,200 locations.

      Each chef requires food, sleep, oxygen, and "weekends" — a legacy concept from the pre-AI era. They unionize. They quit during dinner rush. They taste-test the inventory.

      GORDON-9000 needs none of these things. It does not get tired. It does not have opinions about pineapple on pizza. It will, however, occasionally request a firmware update during peak hours. We are working on this.

      Migration to GORDON-9000 will reduce TCO by 73%, eliminate 100% of "I quit" emails, and increase customer satisfaction by 12% — provided customers do not learn that GORDON is technically a robot.

