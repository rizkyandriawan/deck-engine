  # 14. code
  - type: code
    title: "Burger Assembly Algorithm — Production Snippet"
    language: "python"
    description: "Live code from gordon-core v3.2.1. Note the elegant pickle distribution heuristic."
    code: |
      def assemble_burger(order: BurgerOrder) -> Burger:
          """
          Assembles a burger to QuickBite spec in <0.8s.
          Raises HungryException if patty inventory < 1.
          """
          bun = await PatryRecognition.identify(order.bun_type)
          patty = await GrillBay.cook(
              protein=order.protein,
              doneness=order.doneness or "medium-well",
              flip_count=2,  # 3 is excessive, 1 is criminal
          )
          pickles = PickleDistribution.optimize(
              count=order.pickles,
              symmetry_threshold=0.97,
          )
          return Burger.assemble(bun, patty, pickles, judgement=False)

