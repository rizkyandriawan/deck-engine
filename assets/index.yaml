    left:
      title: "Today: The Human Era"
      body: |
        47,000 chefs across 3,200 locations. Average burger takes 47 seconds. 14% of orders contain incorrect pickle counts.

        Annual chef-related incidents include: 312 grease burns, 1,847 attitude problems, and one viral TikTok about how the manager is "totally mid".

        Operating margin: 6.2%. Customer rage incidents: 4,200/month.
    right:
      title: "Tomorrow: The GORDON Era"
      body: |
        12,000 GORDON-9000 units across the same 3,200 locations. Average burger: 0.8 seconds. Pickle accuracy: 99.97%.

        Annual GORDON incidents include: 4 firmware-induced existential crises, 1 instance of the bot trying to add itself to LinkedIn, and zero TikToks (pending).

        Operating margin: 38.7%. Customer rage incidents: 12/month (mostly about Wi-Fi).

